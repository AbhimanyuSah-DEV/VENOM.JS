<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VENOM.JS — Web Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="terminal" tabindex="0">
    <div id="terminal-output"></div>
    <div id="input-line">
      <span class="prompt-text">venom&gt;</span>
      <input id="command-input" type="text" autocomplete="off" spellcheck="false" autofocus />
    </div>
  </main>
  
  <div id="payload-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span>PAYLOAD OPERATIONS</span>
        <button id="modal-close" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">TARGET FILENAME:</label>
        <input id="payload-filename" type="text" placeholder="e.g. secret.txt" class="modal-input" />
        <label class="modal-label">PAYLOAD CONTENT:</label>
        <textarea id="payload-content" rows="3" placeholder="Enter payload data..." class="modal-input modal-textarea"></textarea>
        <div class="modal-actions">
          <button class="modal-btn" data-crud="DROP_PAYLOAD">DROP</button>
          <button class="modal-btn" data-crud="EXTRACT_DATA">EXTRACT</button>
          <button class="modal-btn" data-crud="INJECT_CODE">INJECT</button>
          <button class="modal-btn" data-crud="DESTROY_EVIDENCE">DESTROY</button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
